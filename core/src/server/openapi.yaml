openapi: 3.0.0
info:
  title: PMXT Sidecar API
  description: >-
    A unified local sidecar API for prediction markets (Polymarket, Kalshi, Limitless). This API acts as a
    JSON-RPC-style gateway. Each endpoint corresponds to a specific method on the generic exchange implementation.
  version: 0.4.4
servers:
  - url: 'http://localhost:3847'
    description: Local development server
paths:
  /health:
    get:
      summary: Server Health Check
      operationId: healthCheck
      responses:
        '200':
          description: Server is consistent and running.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: integer
                    format: int64
  '/api/{exchange}/loadMarkets':
    post:
      summary: Load Markets
      operationId: loadMarkets
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
      requestBody:
        content:
          application/json:
            schema:
              title: LoadMarketsRequest
              type: object
              properties:
                args:
                  type: array
                  maxItems: 1
                  items:
                    type: boolean
                credentials:
                  $ref: '#/components/schemas/ExchangeCredentials'
      responses:
        '200':
          description: Load Markets response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        additionalProperties:
                          $ref: '#/components/schemas/UnifiedMarket'
      description: >-
        Load and cache all markets from the exchange into `this.markets` and `this.marketsBySlug`. Subsequent calls
        return the cached result without hitting the API again. This is the correct way to paginate or iterate over
        markets without drift. Because `fetchMarkets()` always hits the API, repeated calls with different `offset`
        values may return inconsistent results if the exchange reorders or adds markets between requests. Use
        `loadMarkets()` once to get a stable snapshot, then paginate over `Object.values(exchange.markets)` locally.
  '/api/{exchange}/fetchMarkets':
    get:
      summary: Fetch Markets
      operationId: fetchMarkets
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
        - in: query
          name: limit
          required: false
          schema:
            type: number
        - in: query
          name: offset
          required: false
          schema:
            type: number
        - in: query
          name: sort
          required: false
          schema:
            type: string
            enum:
              - volume
              - liquidity
              - newest
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum:
              - active
              - inactive
              - closed
              - all
          description: 'Filter by market status (default: ''active'', ''inactive'' and ''closed'' are interchangeable)'
        - in: query
          name: searchIn
          required: false
          schema:
            type: string
            enum:
              - title
              - description
              - both
          description: 'Where to search (default: ''title'')'
        - in: query
          name: query
          required: false
          schema:
            type: string
          description: For keyword search
        - in: query
          name: slug
          required: false
          schema:
            type: string
          description: For slug/ticker lookup
        - in: query
          name: marketId
          required: false
          schema:
            type: string
          description: Direct lookup by market ID
        - in: query
          name: outcomeId
          required: false
          schema:
            type: string
          description: Reverse lookup -- find market containing this outcome
        - in: query
          name: eventId
          required: false
          schema:
            type: string
          description: Find markets belonging to an event
        - in: query
          name: page
          required: false
          schema:
            type: number
          description: For pagination (used by Limitless)
        - in: query
          name: similarityThreshold
          required: false
          schema:
            type: number
          description: For semantic search (used by Limitless)
      responses:
        '200':
          description: Fetch Markets response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/UnifiedMarket'
      description: >-
        Fetch markets with optional filtering, search, or slug lookup. Always hits the exchange API — results reflect
        the live state at the time of the call.
  '/api/{exchange}/fetchMarketsPaginated':
    get:
      summary: Fetch Markets Paginated
      operationId: fetchMarketsPaginated
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
        - in: query
          name: limit
          required: false
          schema:
            type: number
        - in: query
          name: cursor
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Fetch Markets Paginated response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaginatedMarketsResult'
      description: >-
        Fetch markets with cursor-based pagination backed by a stable in-memory snapshot. On the first call (or when no
        cursor is supplied), fetches all markets once and caches them. Subsequent calls with a cursor returned from a
        previous call slice directly from the cached snapshot — no additional API calls are made. The snapshot is
        invalidated after `snapshotTTL` ms (configured via `ExchangeOptions` in the constructor). A request using a
        cursor from an expired snapshot throws `'Cursor has expired'`.
  '/api/{exchange}/fetchEvents':
    get:
      summary: Fetch Events
      operationId: fetchEvents
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
        - in: query
          name: query
          required: false
          schema:
            type: string
          description: For keyword search
        - in: query
          name: limit
          required: false
          schema:
            type: number
        - in: query
          name: offset
          required: false
          schema:
            type: number
        - in: query
          name: sort
          required: false
          schema:
            type: string
            enum:
              - volume
              - liquidity
              - newest
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum:
              - active
              - inactive
              - closed
              - all
          description: 'Filter by event status (default: ''active'', ''inactive'' and ''closed'' are interchangeable)'
        - in: query
          name: searchIn
          required: false
          schema:
            type: string
            enum:
              - title
              - description
              - both
        - in: query
          name: eventId
          required: false
          schema:
            type: string
          description: Direct lookup by event ID
        - in: query
          name: slug
          required: false
          schema:
            type: string
          description: Lookup by event slug
      responses:
        '200':
          description: Fetch Events response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/UnifiedEvent'
      description: >-
        Fetch events with optional keyword search. Events group related markets together (e.g., "Who will be Fed Chair?"
        contains multiple candidate markets).
  '/api/{exchange}/fetchMarket':
    get:
      summary: Fetch Market
      operationId: fetchMarket
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
        - in: query
          name: limit
          required: false
          schema:
            type: number
        - in: query
          name: offset
          required: false
          schema:
            type: number
        - in: query
          name: sort
          required: false
          schema:
            type: string
            enum:
              - volume
              - liquidity
              - newest
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum:
              - active
              - inactive
              - closed
              - all
          description: 'Filter by market status (default: ''active'', ''inactive'' and ''closed'' are interchangeable)'
        - in: query
          name: searchIn
          required: false
          schema:
            type: string
            enum:
              - title
              - description
              - both
          description: 'Where to search (default: ''title'')'
        - in: query
          name: query
          required: false
          schema:
            type: string
          description: For keyword search
        - in: query
          name: slug
          required: false
          schema:
            type: string
          description: For slug/ticker lookup
        - in: query
          name: marketId
          required: false
          schema:
            type: string
          description: Direct lookup by market ID
        - in: query
          name: outcomeId
          required: false
          schema:
            type: string
          description: Reverse lookup -- find market containing this outcome
        - in: query
          name: eventId
          required: false
          schema:
            type: string
          description: Find markets belonging to an event
        - in: query
          name: page
          required: false
          schema:
            type: number
          description: For pagination (used by Limitless)
        - in: query
          name: similarityThreshold
          required: false
          schema:
            type: number
          description: For semantic search (used by Limitless)
      responses:
        '200':
          description: Fetch Market response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UnifiedMarket'
      description: >-
        Fetch a single market by lookup parameters. Convenience wrapper around fetchMarkets() that returns a single
        result or throws MarketNotFound.
  '/api/{exchange}/fetchEvent':
    get:
      summary: Fetch Event
      operationId: fetchEvent
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
        - in: query
          name: query
          required: false
          schema:
            type: string
          description: For keyword search
        - in: query
          name: limit
          required: false
          schema:
            type: number
        - in: query
          name: offset
          required: false
          schema:
            type: number
        - in: query
          name: sort
          required: false
          schema:
            type: string
            enum:
              - volume
              - liquidity
              - newest
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum:
              - active
              - inactive
              - closed
              - all
          description: 'Filter by event status (default: ''active'', ''inactive'' and ''closed'' are interchangeable)'
        - in: query
          name: searchIn
          required: false
          schema:
            type: string
            enum:
              - title
              - description
              - both
        - in: query
          name: eventId
          required: false
          schema:
            type: string
          description: Direct lookup by event ID
        - in: query
          name: slug
          required: false
          schema:
            type: string
          description: Lookup by event slug
      responses:
        '200':
          description: Fetch Event response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UnifiedEvent'
      description: >-
        Fetch a single event by lookup parameters. Convenience wrapper around fetchEvents() that returns a single result
        or throws EventNotFound.
  '/api/{exchange}/fetchOHLCV':
    get:
      summary: Fetch O H L C V
      operationId: fetchOHLCV
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
        - in: query
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: resolution
          required: false
          schema:
            type: string
            enum:
              - 1m
              - 5m
              - 15m
              - 1h
              - 6h
              - 1d
          description: Required for candle aggregation
        - in: query
          name: start
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: end
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: limit
          required: false
          schema:
            type: number
      responses:
        '200':
          description: Fetch O H L C V response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/PriceCandle'
      description: Fetch historical OHLCV (candlestick) price data for a specific market outcome.
  '/api/{exchange}/fetchOrderBook':
    get:
      summary: Fetch Order Book
      operationId: fetchOrderBook
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
        - in: query
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Fetch Order Book response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/OrderBook'
      description: >-
        Fetch the current order book (bids/asks) for a specific outcome. Essential for calculating spread, depth, and
        execution prices.
  '/api/{exchange}/fetchTrades':
    get:
      summary: Fetch Trades
      operationId: fetchTrades
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
        - in: query
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: start
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: end
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: limit
          required: false
          schema:
            type: number
      responses:
        '200':
          description: Fetch Trades response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Trade'
      description: Fetch raw trade history for a specific outcome.
  '/api/{exchange}/createOrder':
    post:
      summary: Create Order
      operationId: createOrder
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
      requestBody:
        content:
          application/json:
            schema:
              title: CreateOrderRequest
              type: object
              properties:
                args:
                  type: array
                  maxItems: 1
                  items:
                    $ref: '#/components/schemas/CreateOrderParams'
                  minItems: 1
                credentials:
                  $ref: '#/components/schemas/ExchangeCredentials'
              required:
                - args
      responses:
        '200':
          description: Create Order response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Order'
      description: Place a new order on the exchange.
  '/api/{exchange}/buildOrder':
    post:
      summary: Build Order
      operationId: buildOrder
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
      requestBody:
        content:
          application/json:
            schema:
              title: BuildOrderRequest
              type: object
              properties:
                args:
                  type: array
                  maxItems: 1
                  items:
                    $ref: '#/components/schemas/CreateOrderParams'
                  minItems: 1
                credentials:
                  $ref: '#/components/schemas/ExchangeCredentials'
              required:
                - args
      responses:
        '200':
          description: Build Order response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/BuiltOrder'
      description: >-
        Build an order payload without submitting it to the exchange. Returns the exchange-native signed order or
        request body for inspection, forwarding through a middleware layer, or deferred submission via submitOrder().
  '/api/{exchange}/submitOrder':
    post:
      summary: Submit Order
      operationId: submitOrder
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
      requestBody:
        content:
          application/json:
            schema:
              title: SubmitOrderRequest
              type: object
              properties:
                args:
                  type: array
                  maxItems: 1
                  items:
                    $ref: '#/components/schemas/BuiltOrder'
                  minItems: 1
                credentials:
                  $ref: '#/components/schemas/ExchangeCredentials'
              required:
                - args
      responses:
        '200':
          description: Submit Order response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Order'
      description: Submit a pre-built order returned by buildOrder().
  '/api/{exchange}/cancelOrder':
    post:
      summary: Cancel Order
      operationId: cancelOrder
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
      requestBody:
        content:
          application/json:
            schema:
              title: CancelOrderRequest
              type: object
              properties:
                args:
                  type: array
                  maxItems: 1
                  items:
                    type: string
                  minItems: 1
                credentials:
                  $ref: '#/components/schemas/ExchangeCredentials'
              required:
                - args
      responses:
        '200':
          description: Cancel Order response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Order'
      description: Cancel an existing open order.
  '/api/{exchange}/fetchOrder':
    get:
      summary: Fetch Order
      operationId: fetchOrder
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
        - in: query
          name: orderId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Fetch Order response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Order'
      description: Fetch a specific order by ID.
  '/api/{exchange}/fetchOpenOrders':
    get:
      summary: Fetch Open Orders
      operationId: fetchOpenOrders
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
        - in: query
          name: marketId
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Fetch Open Orders response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Order'
      description: 'Fetch all open orders, optionally filtered by market.'
  '/api/{exchange}/fetchMyTrades':
    get:
      summary: Fetch My Trades
      operationId: fetchMyTrades
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
        - in: query
          name: outcomeId
          required: false
          schema:
            type: string
          description: filter to specific outcome/ticker
        - in: query
          name: marketId
          required: false
          schema:
            type: string
          description: filter to specific market
        - in: query
          name: since
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: until
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: limit
          required: false
          schema:
            type: number
        - in: query
          name: cursor
          required: false
          schema:
            type: string
          description: for Kalshi cursor pagination
      responses:
        '200':
          description: Fetch My Trades response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/UserTrade'
  '/api/{exchange}/fetchClosedOrders':
    get:
      summary: Fetch Closed Orders
      operationId: fetchClosedOrders
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
        - in: query
          name: marketId
          required: false
          schema:
            type: string
          description: required for Limitless (slug)
        - in: query
          name: since
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: until
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: limit
          required: false
          schema:
            type: number
        - in: query
          name: cursor
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Fetch Closed Orders response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Order'
  '/api/{exchange}/fetchAllOrders':
    get:
      summary: Fetch All Orders
      operationId: fetchAllOrders
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
        - in: query
          name: marketId
          required: false
          schema:
            type: string
          description: required for Limitless (slug)
        - in: query
          name: since
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: until
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: limit
          required: false
          schema:
            type: number
        - in: query
          name: cursor
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Fetch All Orders response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Order'
  '/api/{exchange}/fetchPositions':
    get:
      summary: Fetch Positions
      operationId: fetchPositions
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
        - in: query
          name: address
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Fetch Positions response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Position'
      description: Fetch current user positions across all markets.
  '/api/{exchange}/fetchBalance':
    get:
      summary: Fetch Balance
      operationId: fetchBalance
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
        - in: query
          name: address
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Fetch Balance response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Balance'
      description: Fetch account balances.
  '/api/{exchange}/getExecutionPrice':
    post:
      summary: Get Execution Price
      operationId: getExecutionPrice
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
      requestBody:
        content:
          application/json:
            schema:
              title: GetExecutionPriceRequest
              type: object
              properties:
                args:
                  type: array
                  minItems: 3
                  maxItems: 3
                  items:
                    oneOf:
                      - $ref: '#/components/schemas/OrderBook'
                      - type: string
                        enum:
                          - buy
                          - sell
                      - type: number
                credentials:
                  $ref: '#/components/schemas/ExchangeCredentials'
              required:
                - args
      responses:
        '200':
          description: Get Execution Price response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: number
      description: >-
        Calculate the volume-weighted average execution price for a given order size. Returns 0 if the order cannot be
        fully filled.
  '/api/{exchange}/getExecutionPriceDetailed':
    post:
      summary: Get Execution Price Detailed
      operationId: getExecutionPriceDetailed
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
      requestBody:
        content:
          application/json:
            schema:
              title: GetExecutionPriceDetailedRequest
              type: object
              properties:
                args:
                  type: array
                  minItems: 3
                  maxItems: 3
                  items:
                    oneOf:
                      - $ref: '#/components/schemas/OrderBook'
                      - type: string
                        enum:
                          - buy
                          - sell
                      - type: number
                credentials:
                  $ref: '#/components/schemas/ExchangeCredentials'
              required:
                - args
      responses:
        '200':
          description: Get Execution Price Detailed response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ExecutionPriceResult'
      description: Calculate detailed execution price information including partial fill data.
  '/api/{exchange}/filterMarkets':
    post:
      summary: Filter Markets
      operationId: filterMarkets
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
      requestBody:
        content:
          application/json:
            schema:
              title: FilterMarketsRequest
              type: object
              properties:
                args:
                  type: array
                  minItems: 2
                  maxItems: 2
                  items:
                    oneOf:
                      - type: array
                        items:
                          $ref: '#/components/schemas/UnifiedMarket'
                      - type: string
                      - type: object
                        properties:
                          text:
                            type: string
                          searchIn:
                            type: array
                            items:
                              type: string
                              enum:
                                - title
                                - description
                                - category
                                - tags
                                - outcomes
                          volume24h:
                            type: object
                            properties:
                              min:
                                type: number
                              max:
                                type: number
                          volume:
                            type: object
                            properties:
                              min:
                                type: number
                              max:
                                type: number
                          liquidity:
                            type: object
                            properties:
                              min:
                                type: number
                              max:
                                type: number
                          openInterest:
                            type: object
                            properties:
                              min:
                                type: number
                              max:
                                type: number
                          resolutionDate:
                            type: object
                            properties:
                              before:
                                type: string
                                format: date-time
                              after:
                                type: string
                                format: date-time
                          category:
                            type: string
                          tags:
                            type: array
                            items:
                              type: string
                          price:
                            type: object
                            properties:
                              outcome:
                                type: string
                                enum:
                                  - 'yes'
                                  - 'no'
                                  - up
                                  - down
                              min:
                                type: number
                              max:
                                type: number
                            required:
                              - outcome
                          priceChange24h:
                            type: object
                            properties:
                              outcome:
                                type: string
                                enum:
                                  - 'yes'
                                  - 'no'
                                  - up
                                  - down
                              min:
                                type: number
                              max:
                                type: number
                            required:
                              - outcome
                      - type: object
                credentials:
                  $ref: '#/components/schemas/ExchangeCredentials'
              required:
                - args
      responses:
        '200':
          description: Filter Markets response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/UnifiedMarket'
      description: >-
        Filter a list of markets by criteria. Can filter by string query, structured criteria object, or custom filter
        function.
  '/api/{exchange}/filterEvents':
    post:
      summary: Filter Events
      operationId: filterEvents
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
      requestBody:
        content:
          application/json:
            schema:
              title: FilterEventsRequest
              type: object
              properties:
                args:
                  type: array
                  minItems: 2
                  maxItems: 2
                  items:
                    oneOf:
                      - type: array
                        items:
                          $ref: '#/components/schemas/UnifiedEvent'
                      - type: string
                      - type: object
                        properties:
                          text:
                            type: string
                          searchIn:
                            type: array
                            items:
                              type: string
                              enum:
                                - title
                                - description
                                - category
                                - tags
                          category:
                            type: string
                          tags:
                            type: array
                            items:
                              type: string
                          marketCount:
                            type: object
                            properties:
                              min:
                                type: number
                              max:
                                type: number
                          totalVolume:
                            type: object
                            properties:
                              min:
                                type: number
                              max:
                                type: number
                      - type: object
                credentials:
                  $ref: '#/components/schemas/ExchangeCredentials'
              required:
                - args
      responses:
        '200':
          description: Filter Events response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/UnifiedEvent'
      description: >-
        Filter a list of events by criteria. Can filter by string query, structured criteria object, or custom filter
        function.
  '/api/{exchange}/watchOrderBook':
    post:
      summary: Watch Order Book
      operationId: watchOrderBook
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
      requestBody:
        content:
          application/json:
            schema:
              title: WatchOrderBookRequest
              type: object
              properties:
                args:
                  type: array
                  minItems: 1
                  maxItems: 2
                  items:
                    oneOf:
                      - type: string
                      - type: number
                credentials:
                  $ref: '#/components/schemas/ExchangeCredentials'
              required:
                - args
      responses:
        '200':
          description: Watch Order Book response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/OrderBook'
      description: >-
        Watch order book updates in real-time via WebSocket. Returns a promise that resolves with the next order book
        update. Call repeatedly in a loop to stream updates (CCXT Pro pattern).
  '/api/{exchange}/watchTrades':
    post:
      summary: Watch Trades
      operationId: watchTrades
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
      requestBody:
        content:
          application/json:
            schema:
              title: WatchTradesRequest
              type: object
              properties:
                args:
                  type: array
                  minItems: 1
                  maxItems: 4
                  items:
                    oneOf:
                      - type: string
                      - type: string
                      - type: number
                      - type: number
                credentials:
                  $ref: '#/components/schemas/ExchangeCredentials'
              required:
                - args
      responses:
        '200':
          description: Watch Trades response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Trade'
      description: >-
        Watch trade executions in real-time via WebSocket. Returns a promise that resolves with the next trade(s). Call
        repeatedly in a loop to stream updates (CCXT Pro pattern).
  '/api/{exchange}/watchAddress':
    post:
      summary: Watch Address
      operationId: watchAddress
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
      requestBody:
        content:
          application/json:
            schema:
              title: WatchAddressRequest
              type: object
              properties:
                args:
                  type: array
                  minItems: 1
                  maxItems: 2
                  items:
                    oneOf:
                      - type: string
                      - type: array
                        items:
                          type: object
                credentials:
                  $ref: '#/components/schemas/ExchangeCredentials'
              required:
                - args
      responses:
        '200':
          description: Watch Address response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/BaseResponse'
                  - type: object
                    properties:
                      data:
                        type: object
      description: >-
        Stream activity for a public wallet address Returns a promise that resolves with the next activity snapshot
        whenever a change is detected. Call repeatedly in a loop to stream updates (CCXT Pro pattern).
  '/api/{exchange}/unwatchAddress':
    post:
      summary: Unwatch Address
      operationId: unwatchAddress
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
      requestBody:
        content:
          application/json:
            schema:
              title: UnwatchAddressRequest
              type: object
              properties:
                args:
                  type: array
                  maxItems: 1
                  items:
                    type: string
                  minItems: 1
                credentials:
                  $ref: '#/components/schemas/ExchangeCredentials'
              required:
                - args
      responses:
        '200':
          description: Unwatch Address response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
      description: Stop watching a previously registered wallet address and release its resource updates.
  '/api/{exchange}/close':
    post:
      summary: Close
      operationId: close
      parameters:
        - $ref: '#/components/parameters/ExchangeParam'
      requestBody:
        content:
          application/json:
            schema:
              title: CloseRequest
              type: object
              properties:
                args:
                  type: array
                  maxItems: 0
                  items: {}
                credentials:
                  $ref: '#/components/schemas/ExchangeCredentials'
      responses:
        '200':
          description: Close response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
      description: >-
        Close all WebSocket connections and clean up resources. Call this when you're done streaming to properly release
        connections.
components:
  parameters:
    ExchangeParam:
      in: path
      name: exchange
      schema:
        type: string
        enum:
          - polymarket
          - kalshi
          - kalshi-demo
          - limitless
          - probable
          - baozi
          - myriad
          - opinion
          - metaculus
          - smarkets
          - polymarket_us
      required: true
      description: The prediction market exchange to target.
  schemas:
    BaseResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        error:
          $ref: '#/components/schemas/ErrorDetail'
    ErrorDetail:
      type: object
      properties:
        message:
          type: string
    BaseRequest:
      type: object
      description: Base request structure with optional credentials
      properties:
        credentials:
          $ref: '#/components/schemas/ExchangeCredentials'
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          $ref: '#/components/schemas/ErrorDetail'
    UnifiedMarket:
      type: object
      properties:
        marketId:
          type: string
          description: The unique identifier for this market
        eventId:
          type: string
          description: Link to parent event
        title:
          type: string
        description:
          type: string
        slug:
          type: string
        outcomes:
          type: array
          items:
            $ref: '#/components/schemas/MarketOutcome'
        resolutionDate:
          type: string
          format: date-time
        volume24h:
          type: number
        volume:
          type: number
          description: Total / Lifetime volume
        liquidity:
          type: number
        openInterest:
          type: number
        url:
          type: string
        image:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        tickSize:
          type: number
          description: 'Minimum price increment (e.g., 0.01, 0.001)'
        status:
          type: string
          description: 'Venue-native lifecycle status (e.g. ''active'', ''closed'', ''archived'').'
        contractAddress:
          type: string
          description: 'On-chain contract / condition identifier where applicable (Polymarket conditionId, etc.).'
        'yes':
          $ref: '#/components/schemas/MarketOutcome'
        'no':
          $ref: '#/components/schemas/MarketOutcome'
        up:
          $ref: '#/components/schemas/MarketOutcome'
        down:
          $ref: '#/components/schemas/MarketOutcome'
      required:
        - marketId
        - title
        - description
        - outcomes
        - resolutionDate
        - volume24h
        - liquidity
        - url
    MarketOutcome:
      type: object
      properties:
        outcomeId:
          type: string
          description: 'Outcome ID for trading operations (CLOB Token ID for Polymarket, Market Ticker for Kalshi)'
        marketId:
          type: string
          description: The market this outcome belongs to (set automatically when outcomes are built)
        label:
          type: string
        price:
          type: number
        priceChange24h:
          type: number
        metadata:
          type: object
          additionalProperties: {}
          description: 'Exchange-specific metadata (e.g., clobTokenId for Polymarket)'
      required:
        - outcomeId
        - label
        - price
    UnifiedEvent:
      type: object
      description: 'A grouped collection of related markets (e.g., "Who will be Fed Chair?" contains multiple candidate markets).'
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        slug:
          type: string
        markets:
          type: array
          items:
            $ref: '#/components/schemas/UnifiedMarket'
        volume24h:
          type: number
        volume:
          type: number
          description: Total / Lifetime volume (sum across markets; undefined if no market provides it)
        url:
          type: string
        image:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
      required:
        - id
        - title
        - description
        - slug
        - markets
        - volume24h
        - url
    PriceCandle:
      type: object
      properties:
        timestamp:
          type: number
        open:
          type: number
        high:
          type: number
        low:
          type: number
        close:
          type: number
        volume:
          type: number
      required:
        - timestamp
        - open
        - high
        - low
        - close
    OrderBook:
      type: object
      properties:
        bids:
          type: array
          items:
            $ref: '#/components/schemas/OrderLevel'
        asks:
          type: array
          items:
            $ref: '#/components/schemas/OrderLevel'
        timestamp:
          type: number
      required:
        - bids
        - asks
    OrderLevel:
      type: object
      properties:
        price:
          type: number
          description: 0.0 to 1.0 (probability)
        size:
          type: number
          description: contracts/shares
      required:
        - price
        - size
    Trade:
      type: object
      properties:
        id:
          type: string
        timestamp:
          type: number
        price:
          type: number
        amount:
          type: number
        side:
          type: string
          enum:
            - buy
            - sell
            - unknown
        outcomeId:
          type: string
      required:
        - id
        - timestamp
        - price
        - amount
        - side
    UserTrade:
      type: object
      properties:
        id:
          type: string
        timestamp:
          type: number
        price:
          type: number
        amount:
          type: number
        side:
          type: string
          enum:
            - buy
            - sell
            - unknown
        outcomeId:
          type: string
        orderId:
          type: string
      required:
        - id
        - timestamp
        - price
        - amount
        - side
    Order:
      type: object
      properties:
        id:
          type: string
        marketId:
          type: string
        outcomeId:
          type: string
        side:
          type: string
          enum:
            - buy
            - sell
        type:
          type: string
          enum:
            - market
            - limit
        price:
          type: number
          description: For limit orders
        amount:
          type: number
          description: Size in contracts/shares
        status:
          type: string
          enum:
            - pending
            - open
            - filled
            - cancelled
            - rejected
        filled:
          type: number
          description: Amount filled
        remaining:
          type: number
          description: Amount remaining
        timestamp:
          type: number
        fee:
          type: number
      required:
        - id
        - marketId
        - outcomeId
        - side
        - type
        - amount
        - status
        - filled
        - remaining
        - timestamp
    Position:
      type: object
      properties:
        marketId:
          type: string
        outcomeId:
          type: string
        outcomeLabel:
          type: string
        size:
          type: number
          description: 'Positive for long, negative for short'
        entryPrice:
          type: number
        currentPrice:
          type: number
        unrealizedPnL:
          type: number
        realizedPnL:
          type: number
      required:
        - marketId
        - outcomeId
        - outcomeLabel
        - size
        - entryPrice
        - currentPrice
        - unrealizedPnL
    Balance:
      type: object
      properties:
        currency:
          type: string
          description: 'e.g., ''USDC'''
        total:
          type: number
        available:
          type: number
        locked:
          type: number
          description: In open orders
      required:
        - currency
        - total
        - available
        - locked
    ExecutionPriceResult:
      type: object
      properties:
        price:
          type: number
        filledAmount:
          type: number
        fullyFilled:
          type: boolean
      required:
        - price
        - filledAmount
        - fullyFilled
    PaginatedMarketsResult:
      type: object
      description: Shape returned by fetchMarketsPaginated
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/UnifiedMarket'
        total:
          type: number
        nextCursor:
          type: string
      required:
        - data
        - total
    MarketFilterParams:
      type: object
      properties:
        limit:
          type: number
        offset:
          type: number
        sort:
          type: string
          enum:
            - volume
            - liquidity
            - newest
        status:
          type: string
          enum:
            - active
            - inactive
            - closed
            - all
          description: 'Filter by market status (default: ''active'', ''inactive'' and ''closed'' are interchangeable)'
        searchIn:
          type: string
          enum:
            - title
            - description
            - both
          description: 'Where to search (default: ''title'')'
        query:
          type: string
          description: For keyword search
        slug:
          type: string
          description: For slug/ticker lookup
        marketId:
          type: string
          description: Direct lookup by market ID
        outcomeId:
          type: string
          description: Reverse lookup -- find market containing this outcome
        eventId:
          type: string
          description: Find markets belonging to an event
        page:
          type: number
          description: For pagination (used by Limitless)
        similarityThreshold:
          type: number
          description: For semantic search (used by Limitless)
    EventFetchParams:
      type: object
      properties:
        query:
          type: string
          description: For keyword search
        limit:
          type: number
        offset:
          type: number
        sort:
          type: string
          enum:
            - volume
            - liquidity
            - newest
        status:
          type: string
          enum:
            - active
            - inactive
            - closed
            - all
          description: 'Filter by event status (default: ''active'', ''inactive'' and ''closed'' are interchangeable)'
        searchIn:
          type: string
          enum:
            - title
            - description
            - both
        eventId:
          type: string
          description: Direct lookup by event ID
        slug:
          type: string
          description: Lookup by event slug
    HistoryFilterParams:
      type: object
      description: Deprecated - use OHLCVParams or TradesParams instead. Resolution is optional for backward compatibility.
      properties:
        resolution:
          type: string
          enum:
            - 1m
            - 5m
            - 15m
            - 1h
            - 6h
            - 1d
          description: Optional for backward compatibility
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
        limit:
          type: number
    OHLCVParams:
      type: object
      properties:
        resolution:
          type: string
          enum:
            - 1m
            - 5m
            - 15m
            - 1h
            - 6h
            - 1d
          description: Required for candle aggregation
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
        limit:
          type: number
      required:
        - resolution
    TradesParams:
      type: object
      description: Parameters for fetching trade history. No resolution parameter - trades are discrete events.
      properties:
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
        limit:
          type: number
    CreateOrderParams:
      type: object
      properties:
        marketId:
          type: string
        outcomeId:
          type: string
        side:
          type: string
          enum:
            - buy
            - sell
        type:
          type: string
          enum:
            - market
            - limit
        amount:
          type: number
        price:
          type: number
          description: Required for limit orders
        fee:
          type: number
          description: 'Optional fee rate (e.g., 1000 for 0.1%)'
        tickSize:
          type: number
          description: Optional override for Limitless/Polymarket
        negRisk:
          type: boolean
          description: Optional override to skip neg-risk lookup (Polymarket)
      required:
        - marketId
        - outcomeId
        - side
        - type
        - amount
    BuiltOrder:
      type: object
      properties:
        exchange:
          type: string
          description: The exchange name this order was built for.
        params:
          allOf:
            - $ref: '#/components/schemas/CreateOrderParams'
          description: The original params used to build this order.
        signedOrder:
          type: object
          additionalProperties: {}
          description: 'For CLOB exchanges (Polymarket): the EIP-712 signed order ready to POST to the exchange''s order endpoint.'
        tx:
          type: object
          properties:
            to:
              type: string
            data:
              type: string
            value:
              type: string
            chainId:
              type: number
          required:
            - to
            - data
            - value
            - chainId
          description: >-
            For on-chain AMM exchanges: the EVM transaction payload. Reserved for future exchanges; no current exchange
            populates this.
        raw:
          description: 'The raw, exchange-native payload. Always present.'
      required:
        - exchange
        - params
        - raw
    MyTradesParams:
      type: object
      properties:
        outcomeId:
          type: string
          description: filter to specific outcome/ticker
        marketId:
          type: string
          description: filter to specific market
        since:
          type: string
          format: date-time
        until:
          type: string
          format: date-time
        limit:
          type: number
        cursor:
          type: string
          description: for Kalshi cursor pagination
    OrderHistoryParams:
      type: object
      properties:
        marketId:
          type: string
          description: required for Limitless (slug)
        since:
          type: string
          format: date-time
        until:
          type: string
          format: date-time
        limit:
          type: number
        cursor:
          type: string
    ExchangeCredentials:
      type: object
      description: Optional authentication credentials for exchange operations.
      properties:
        apiKey:
          type: string
        apiSecret:
          type: string
        passphrase:
          type: string
        apiToken:
          type: string
          description: 'Metaculus: `Authorization: Token <apiToken>` for higher rate limits'
        privateKey:
          type: string
          description: Required for Polymarket L1 auth
        signatureType:
          oneOf:
            - type: number
            - type: string
          description: '0 = EOA, 1 = Poly Proxy, 2 = Gnosis Safe (Can also use ''eoa'', ''polyproxy'', ''gnosis_safe'')'
        funderAddress:
          type: string
          description: The address funding the trades (defaults to signer address)
